<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Tools and technologies used in this pipeline</title>
<desc>All AWS and open source tools used: Python, boto3, S3, Amazon Bedrock, AWS Lambda, Git</desc>
<defs>
<style>
.t  { font-family: "Anthropic Sans", sans-serif; font-size: 14px; font-weight: 400; fill: var(--text-primary, #1a1a1a); }
.ts { font-family: "Anthropic Sans", sans-serif; font-size: 12px; font-weight: 400; fill: var(--text-secondary, #595957); }
.th { font-family: "Anthropic Sans", sans-serif; font-size: 14px; font-weight: 500; fill: var(--text-primary, #1a1a1a); }
.card { fill: var(--surface-1, #F8F7F3); stroke: var(--border, #D3D1C7); stroke-width: 0.5; }
@media (prefers-color-scheme: dark) {
.card { fill: #2C2C2A; stroke: #5F5E5A; }
.t  { fill: #e8e6de; }
.ts { fill: #9c9a92; }
.th { fill: #e8e6de; }
}
</style>
</defs>

