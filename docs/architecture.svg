<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Pipeline architecture: GitHub to Lambda</title>
<desc>Four-layer medallion architecture flowing from GitHub through Bronze, Silver, Gold S3 layers to AWS Lambda retrieval tool</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t  { font-family: "Anthropic Sans", sans-serif; font-size: 14px; font-weight: 400; fill: var(--text-primary, #1a1a1a); }
.ts { font-family: "Anthropic Sans", sans-serif; font-size: 12px; font-weight: 400; fill: var(--text-secondary, #595957); }
.th { font-family: "Anthropic Sans", sans-serif; font-size: 14px; font-weight: 500; fill: var(--text-primary, #1a1a1a); }
.arr { fill: none; stroke: var(--border-strong, #888780); stroke-width: 1.5; }
.c-gray rect  { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray .th   { fill: #2C2C2A; }
.c-gray .ts   { fill: #5F5E5A; }
.c-amber rect { fill: #FAEEDA; stroke: #BA7517; }
.c-amber .th  { fill: #412402; }
.c-amber .ts  { fill: #854F0B; }
.c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal .th   { fill: #04342C; }
.c-teal .ts   { fill: #0F6E56; }
.c-blue rect  { fill: #E6F1FB; stroke: #185FA5; }
.c-blue .th   { fill: #042C53; }
.c-blue .ts   { fill: #185FA5; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-purple .th  { fill: #26215C; }
.c-purple .ts  { fill: #534AB7; }
@media (prefers-color-scheme: dark) {
.c-gray rect  { fill: #444441; stroke: #B4B2A9; }
.c-gray .th   { fill: #D3D1C7; }
.c-gray .ts   { fill: #B4B2A9; }
.c-amber rect { fill: #633806; stroke: #FAC775; }
.c-amber .th  { fill: #FAEEDA; }
.c-amber .ts  { fill: #FAC775; }
.c-teal rect  { fill: #085041; stroke: #5DCAA5; }
.c-teal .th   { fill: #E1F5EE; }
.c-teal .ts   { fill: #9FE1CB; }
.c-blue rect  { fill: #0C447C; stroke: #85B7EB; }
.c-blue .th   { fill: #E6F1FB; }
.c-blue .ts   { fill: #B5D4F4; }
.c-purple rect { fill: #3C3489; stroke: #AFA9EC; }
.c-purple .th  { fill: #EEEDFE; }
.c-purple .ts  { fill: #CECBF6; }
.t  { fill: var(--text-primary, #e8e6de); }
.ts { fill: var(--text-secondary, #9c9a92); }
.th { fill: var(--text-primary, #e8e6de); }
}
</style>
</defs>

<!-- GitHub source -->
<g class="c-gray">
<rect x="40" y="30" width="160" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="57" text-anchor="middle" dominant-baseline="central">GitHub repo</text>
<text class="ts" x="120" y="77" text-anchor="middle" dominant-baseline="central">aws/aws-sdk-pandas</text>
</g>

<!-- Arrow 1 -->
<line x1="200" y1="62" x2="238" y2="62" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="219" y="55" text-anchor="middle">clone</text>

<!-- Bronze -->
<g class="c-amber">
<rect x="240" y="30" width="160" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="320" y="57" text-anchor="middle" dominant-baseline="central">Bronze (S3)</text>
<text class="ts" x="320" y="77" text-anchor="middle" dominant-baseline="central">Raw JSONL.gz + provenance</text>
</g>

<!-- Arrow 2 -->
<line x1="400" y1="62" x2="438" y2="62" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="419" y="55" text-anchor="middle">parse</text>

<!-- Silver -->
<g class="c-teal">
<rect x="440" y="30" width="160" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="57" text-anchor="middle" dominant-baseline="central">Silver (S3)</text>
<text class="ts" x="520" y="77" text-anchor="middle" dominant-baseline="central">Cleaned + deduplicated</text>
</g>

<!-- Arrow down from silver -->
<line x1="520" y1="94" x2="520" y2="144" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="534" y="122" dominant-baseline="central">chunk + embed</text>

<!-- Gold -->
<g class="c-blue">
<rect x="440" y="146" width="160" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="520" y="173" text-anchor="middle" dominant-baseline="central">Gold (S3)</text>
<text class="ts" x="520" y="193" text-anchor="middle" dominant-baseline="central">768-dim vectors per chunk</text>
</g>

<!-- Arrow left from gold to lambda -->
<line x1="440" y1="178" x2="402" y2="178" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="421" y="171" text-anchor="middle">load</text>

<!-- Lambda -->
<g class="c-purple">
<rect x="240" y="146" width="160" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="320" y="173" text-anchor="middle" dominant-baseline="central">Lambda (retrieval)</text>
<text class="ts" x="320" y="193" text-anchor="middle" dominant-baseline="central">Cosine similarity search</text>
</g>

<!-- Arrow left from lambda to agent -->
<line x1="240" y1="178" x2="202" y2="178" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="221" y="171" text-anchor="middle">JSON</text>

<!-- Agent -->
<g class="c-gray">
<rect x="40" y="146" width="160" height="64" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="173" text-anchor="middle" dominant-baseline="central">AI agent</text>
<text class="ts" x="120" y="193" text-anchor="middle" dominant-baseline="central">Any framework</text>
</g>

<!-- Divider -->
<line x1="40" y1="250" x2="640" y2="250" stroke="var(--border, #D3D1C7)" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- Detail boxes row -->
<text class="th" x="40" y="280" dominant-baseline="central">What each layer stores</text>

<!-- Bronze detail -->
<g class="c-amber">
<rect x="40" y="300" width="140" height="100" rx="8" stroke-width="0.5"/>
<text class="th" x="110" y="322" text-anchor="middle" dominant-baseline="central">Bronze</text>
<text class="ts" x="110" y="342" text-anchor="middle" dominant-baseline="central">doc_path</text>
<text class="ts" x="110" y="358" text-anchor="middle" dominant-baseline="central">content (raw)</text>
<text class="ts" x="110" y="374" text-anchor="middle" dominant-baseline="central">content_hash</text>
<text class="ts" x="110" y="390" text-anchor="middle" dominant-baseline="central">_commit, _pulled_at</text>
</g>

<!-- Silver detail -->
<g class="c-teal">
<rect x="200" y="300" width="140" height="100" rx="8" stroke-width="0.5"/>
<text class="th" x="270" y="322" text-anchor="middle" dominant-baseline="central">Silver</text>
<text class="ts" x="270" y="342" text-anchor="middle" dominant-baseline="central">title (parsed)</text>
<text class="ts" x="270" y="358" text-anchor="middle" dominant-baseline="central">body_for_embed</text>
<text class="ts" x="270" y="374" text-anchor="middle" dominant-baseline="central">body_full</text>
<text class="ts" x="270" y="390" text-anchor="middle" dominant-baseline="central">deduped by hash</text>
</g>

<!-- Gold detail -->
<g class="c-blue">
<rect x="360" y="300" width="140" height="100" rx="8" stroke-width="0.5"/>
<text class="th" x="430" y="322" text-anchor="middle" dominant-baseline="central">Gold</text>
<text class="ts" x="430" y="342" text-anchor="middle" dominant-baseline="central">chunk_id</text>
<text class="ts" x="430" y="358" text-anchor="middle" dominant-baseline="central">chunk_text</text>
<text class="ts" x="430" y="374" text-anchor="middle" dominant-baseline="central">embedding [768]</text>
<text class="ts" x="430" y="390" text-anchor="middle" dominant-baseline="central">embedding_model</text>
</g>

<!-- Lambda detail -->
<g class="c-purple">
<rect x="520" y="300" width="140" height="100" rx="8" stroke-width="0.5"/>
<text class="th" x="590" y="322" text-anchor="middle" dominant-baseline="central">Lambda</text>
<text class="ts" x="590" y="342" text-anchor="middle" dominant-baseline="central">load gold on cold start</text>
<text class="ts" x="590" y="358" text-anchor="middle" dominant-baseline="central">embed query</text>
<text class="ts" x="590" y="374" text-anchor="middle" dominant-baseline="central">cosine similarity</text>
<text class="ts" x="590" y="390" text-anchor="middle" dominant-baseline="central">return top-k JSON</text>
</g>

<!-- Cost bar -->
<rect x="40" y="430" width="600" height="60" rx="8" fill="none" stroke="var(--border, #D3D1C7)" stroke-width="0.5" stroke-dasharray="4 4"/>
<text class="ts" x="340" y="455" text-anchor="middle" dominant-baseline="central">Total AWS cost: ~$0.01 one-time (Bedrock embeddings) · Lambda free tier · S3 under 1MB</text>
<text class="ts" x="340" y="475" text-anchor="middle" dominant-baseline="central">Incremental reruns: near $0 — only changed chunks are re-embedded</text>
</svg>
