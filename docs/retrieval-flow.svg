<svg width="100%" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Retrieval flow: query to ranked results</title>
<desc>How a plain English query flows through the Lambda function to return semantically ranked document chunks</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.t  { font-family: "Anthropic Sans", sans-serif; font-size: 14px; font-weight: 400; fill: var(--text-primary, #1a1a1a); }
.ts { font-family: "Anthropic Sans", sans-serif; font-size: 12px; font-weight: 400; fill: var(--text-secondary, #595957); }
.th { font-family: "Anthropic Sans", sans-serif; font-size: 14px; font-weight: 500; fill: var(--text-primary, #1a1a1a); }
.arr { fill: none; stroke: var(--border-strong, #888780); stroke-width: 1.5; }
.c-gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray .th    { fill: #2C2C2A; }
.c-gray .ts    { fill: #5F5E5A; }
.c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
.c-purple .th  { fill: #26215C; }
.c-purple .ts  { fill: #534AB7; }
.c-blue rect   { fill: #E6F1FB; stroke: #185FA5; }
.c-blue .th    { fill: #042C53; }
.c-blue .ts    { fill: #185FA5; }
.c-amber rect  { fill: #FAEEDA; stroke: #BA7517; }
.c-amber .th   { fill: #412402; }
.c-amber .ts   { fill: #854F0B; }
.c-teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal .th    { fill: #04342C; }
.c-teal .ts    { fill: #0F6E56; }
@media (prefers-color-scheme: dark) {
.c-gray rect   { fill: #444441; stroke: #B4B2A9; }
.c-gray .th    { fill: #D3D1C7; }
.c-gray .ts    { fill: #B4B2A9; }
.c-purple rect { fill: #3C3489; stroke: #AFA9EC; }
.c-purple .th  { fill: #EEEDFE; }
.c-purple .ts  { fill: #CECBF6; }
.c-blue rect   { fill: #0C447C; stroke: #85B7EB; }
.c-blue .th    { fill: #E6F1FB; }
.c-blue .ts    { fill: #B5D4F4; }
.c-amber rect  { fill: #633806; stroke: #FAC775; }
.c-amber .th   { fill: #FAEEDA; }
.c-amber .ts   { fill: #FAC775; }
.c-teal rect   { fill: #085041; stroke: #5DCAA5; }
.c-teal .th    { fill: #E1F5EE; }
.c-teal .ts    { fill: #9FE1CB; }
.t  { fill: var(--text-primary, #e8e6de); }
.ts { fill: var(--text-secondary, #9c9a92); }
.th { fill: var(--text-primary, #e8e6de); }
}
</style>
</defs>

<!-- Step 1: Query in -->
<g class="c-gray">
<rect x="40" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="110" y="64" text-anchor="middle" dominant-baseline="central">Agent sends query</text>
<text class="ts" x="110" y="82" text-anchor="middle" dominant-baseline="central">"how do I install..."</text>
</g>
<line x1="180" y1="68" x2="218" y2="68" class="arr" marker-end="url(#arrow)"/>

<!-- Step 2: Embed query -->
<g class="c-purple">
<rect x="220" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="290" y="64" text-anchor="middle" dominant-baseline="central">Bedrock embeds query</text>
<text class="ts" x="290" y="82" text-anchor="middle" dominant-baseline="central">768-dim vector</text>
</g>
<line x1="360" y1="68" x2="398" y2="68" class="arr" marker-end="url(#arrow)"/>

<!-- Step 3: Cosine similarity -->
<g class="c-blue">
<rect x="400" y="40" width="140" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="470" y="64" text-anchor="middle" dominant-baseline="central">Cosine similarity</text>
<text class="ts" x="470" y="82" text-anchor="middle" dominant-baseline="central">vs all 33 chunks</text>
</g>
<line x1="540" y1="68" x2="578" y2="68" class="arr" marker-end="url(#arrow)"/>

<!-- Step 4: Return ranked -->
<g class="c-teal">
<rect x="580" y="40" width="80" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="620" y="64" text-anchor="middle" dominant-baseline="central">Top-k</text>
<text class="ts" x="620" y="82" text-anchor="middle" dominant-baseline="central">ranked JSON</text>
</g>

<!-- Divider -->
<line x1="40" y1="130" x2="640" y2="130" stroke="var(--border, #D3D1C7)" stroke-width="0.5" stroke-dasharray="4 4"/>

<!-- Example results -->
<text class="th" x="40" y="158" dominant-baseline="central">Example: query = "how does aws sdk pandas handle IAM permissions"</text>

<!-- Result 1 - highest score -->
<g class="c-teal">
<rect x="40" y="175" width="600" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="60" y="194" dominant-baseline="central">score 0.87</text>
<text class="ts" x="140" y="194" dominant-baseline="central">adr/0004-no-alter-iam-permissions.md</text>
<text class="ts" x="140" y="210" dominant-baseline="central">Architecture decision record — explicit IAM design decision</text>
</g>

<!-- Result 2 -->
<g class="c-blue">
<rect x="40" y="227" width="600" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="60" y="246" dominant-baseline="central">score 0.50</text>
<text class="ts" x="140" y="246" dominant-baseline="central">README.md</text>
<text class="ts" x="140" y="262" dominant-baseline="central">General SDK overview</text>
</g>

<!-- Result 3 -->
<g class="c-gray">
<rect x="40" y="279" width="600" height="44" rx="6" stroke-width="0.5"/>
<text class="th" x="60" y="298" dominant-baseline="central">score 0.49</text>
<text class="ts" x="140" y="298" dominant-baseline="central">CONTRIBUTING.md</text>
<text class="ts" x="140" y="314" dominant-baseline="central">Vulnerability reporting page reference</text>
</g>

<!-- Latency label -->
<text class="ts" x="640" y="197" text-anchor="end" dominant-baseline="central">178ms</text>
</svg>
